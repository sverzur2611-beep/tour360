<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Tour 360</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }
        #panorama {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="panorama"></div>

        "scenes": {

                "yaw": 0,
                "hotSpots": [
                    {

                        "sceneId": "huerto5"
                    },
                    {
                        "pitch": 0,
                        "yaw": -40,
                        "type": "scene",
                        "text": "Ir a Carpa 4",
                        "sceneId": "carpa4"
                    },
                    {
                        "pitch": 0,
                        "yaw": 180,
                        "type": "scene",

                    {

</html>
