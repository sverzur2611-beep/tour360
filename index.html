<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tour IES Alguadaira</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        #panorama {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="panorama"></div>

    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <script>
        pannellum.viewer('panorama', {
            default: {
                firstScene: 'entrada',
                autoLoad: true,
                sceneFadeDuration: 1000
            },

            scenes: {
                entrada: {
                    title: 'Entrada',
                    type: 'equirectangular',
                    panorama: 'assets/scenes/entrada1.png',
                    hotSpots: [
                        {
                            pitch: -6,
                            yaw: 0,
                            type: 'scene',
                            text: 'Ir al hall',
                            sceneId: 'hall'
                        }
                    ]
                },

                hall: {
                    title: 'Hall',
                    type: 'equirectangular',
                    panorama: 'assets/scenes/hall_2.png',
                    hotSpots: [
                        {
                            pitch: 0,
                            yaw: -50,
                            type: 'scene',
                            text: 'Ir al patio',
                            sceneId: 'patio'
                        },
                        {
                            pitch: -3,
                            yaw: 90,
                            type: 'scene',
                            text: 'Volver a la entrada',
                            sceneId: 'entrada'
                        }
                    ]
                },

                patio: {
                    title: 'Patio',
                    type: 'equirectangular',
                    panorama: 'assets/scenes/patio3.png',
                    hotSpots: [
                        {
                            pitch: -8,
                            yaw: 25,
                            type: 'scene',
                            text: 'Ir a carpa',
                            sceneId: 'carpa'
                        },
                        {
                            pitch: -10,
                            yaw: -160,
                            type: 'scene',
                            text: 'Ir al huerto',
                            sceneId: 'huerto'
                        },
                        {
                            pitch: -8,
                            yaw: 60,
                            type: 'scene',
                            text: 'Volver al hall',
                            sceneId: 'hall'
                        }
                    ]
                },

                carpa: {
                    title: 'Carpa',
                    type: 'equirectangular',
                    panorama: 'assets/scenes/carpa-4.png',
                    hotSpots: [
                        {
                            pitch: -4,
                            yaw: 180,
                            type: 'scene',
                            text: 'Volver al patio',
                            sceneId: 'patio'
                        }
                    ]
                },

                huerto: {
                    title: 'Huerto',
                    type: 'equirectangular',
                    panorama: 'assets/scenes/huerto_5.jpg',
                    hotSpots: [
                        {
                            pitch: 3,
                            yaw: 87,
                            type: 'scene',
                            text: 'Volver al patio',
                            sceneId: 'patio'
                        },
                        {
                            pitch: -2,
                            yaw: -100,
                            type: 'scene',
                            text: 'Ir a las gradas',
                            sceneId: 'gradas'
                        }
                    ]
                },

                gradas: {
                    title: 'Gradas',
                    type: 'equirectangular',
                    panorama: 'assets/scenes/gradas_6.png',
                    hotSpots: [
                        {
                            pitch: -3,
                            yaw: -118,
                            type: 'scene',
                            text: 'Ir al rincón de la mujer',
                            sceneId: 'rinconMujer'
                        },
                        {
                            pitch: 2,
                            yaw: 134,
                            type: 'scene',
                            text: 'Volver al huerto',
                            sceneId: 'huerto'
                        }
                    ]
                },

                rinconMujer: {
                    title: 'Rincón de la mujer',
                    type: 'equirectangular',
                    panorama: 'assets/scenes/rincon_mujer_7.png',
                    hotSpots: [
                        {
                            pitch: 0,
                            yaw: 126,
                            type: 'scene',
                            text: 'Volver a gradas',
                            sceneId: 'gradas'
                        }
                    ]
                }
            }
        });
    </script>
</body>
</html>
