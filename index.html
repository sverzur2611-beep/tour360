<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tour IES Alguadaira</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<style>
html, body {
    margin: 0;
    width: 100%;
    height: 100%;
}
#panorama {
    width: 100%;
    height: 100vh;
}
</style>
</head>
<body>

<div id="panorama"></div>

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

<script>
pannellum.viewer('panorama', {
    default: {
        firstScene: 'entrada',
        autoLoad: true,
        sceneFadeDuration: 1000
    },

    scenes: {

        entrada: {
            title: 'Entrada',
            type: 'equirectangular',
            panorama: 'assets/scenes/Entrada1.png',
            hotSpots: [
                {
                    pitch: -6.09,
                    yaw: -0.03,
                    type: 'scene',
                    text: 'Ir al hall',
                    sceneId: 'hall'
                }
            ]
        },

        hall: {
            title: 'Hall',
            type: 'equirectangular',
            panorama: 'assets/scenes/hall_2.png',
            hotSpots: [
                {
                    pitch: 0.34,
                    yaw: -50.80,
                    type: 'scene',
                    text: 'Ir al patio',
                    sceneId: 'patio'
                },
                {
                    pitch: -3.08,
                    yaw: 91.75,
                    type: 'scene',
                    text: 'Volver a la entrada',
                    sceneId: 'entrada'
                }
            ]
        },

        patio: {
            title: 'Patio',
            type: 'equirectangular',
            panorama: 'assets/scenes/patio3.png',
            hotSpots: [
                {
                    pitch: -8.32,
                    yaw: 24.91,
                    type: 'scene',
                    text: 'Ir a carpa',
                    sceneId: 'carpa'
                },
                {
                    pitch: -9.95,
                    yaw: -160.56,
                    type: 'scene',
                    text: 'Ir al huerto',
                    sceneId: 'huerto'
                },
                {
                    pitch: -8.75,
                    yaw: 59.04,
                    type: 'scene',
                    text: 'Volver al hall',
                    sceneId: 'hall'
                }
            ]
        },

        carpa: {
            title: 'Carpa',
            type: 'equirectangular',
            panorama: 'assets/scenes/carpa-4.png',
            hotSpots: [
                {
                    pitch: -4,
                    yaw: 180,
                    type: 'scene',
                    text: 'Volver al patio',
                    sceneId: 'patio'
                }
            ]
        },

        huerto: {
            title: 'Huerto',
            type: 'equirectangular',
            panorama: 'assets/scenes/Huerto%205.jpeg',
            hotSpots: [
                {
                    pitch: 3.21,
                    yaw: 87.27,
                    type: 'scene',
                    text: 'Volver al patio',
                    sceneId: 'patio'
                },
                {
                    pitch: -2.19,
                    yaw: -100.56,
                    type: 'scene',
                    text: 'Ir a las gradas',
                    sceneId: 'gradas'
                }
            ]
        },

        gradas: {
            title: 'Gradas',
            type: 'equirectangular',
            panorama: 'assets/scenes/Gradas%206.png',
            hotSpots: [
                {
                    pitch: -3.18,
                    yaw: -118.04,
                    type: 'scene',
                    text: 'Ir al rincón de la mujer',
                    sceneId: 'rinconMujer'
                },
                {
                    pitch: 1.75,
                    yaw: 134.30,
                    type: 'scene',
                    text: 'Volver al huerto',
                    sceneId: 'huerto'
                }
            ]
        },

        rinconMujer: {
            title: 'Rincón de la mujer',
            type: 'equirectangular',
            panorama: 'assets/scenes/RinconMujer%207.png',
            hotSpots: [
                {
                    pitch: -0.04,
                    yaw: 126.55,
                    type: 'scene',
                    text: 'Acceso a gradas',
                    sceneId: 'gradas'
                }
            ]
        }

    }
});
</script>

</body>
</html>
